<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lirios para ti</title>
  <style>
    :root {
      color-scheme: dark;
      --paper: #fff7fb;
      --ink: #46243a;
      --rose: #d94b78;
      --lily: #f8eff7;
      --lily-edge: #dca2c5;
      --leaf: #28765f;
      --leaf-soft: #54a27c;
      --gold: #f6d48b;
      --night: #171723;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 229, 237, 0.32), transparent 28%),
        radial-gradient(circle at 84% 16%, rgba(246, 212, 139, 0.2), transparent 26%),
        linear-gradient(155deg, #15151f 0%, #2b1b30 48%, #4d2438 100%);
      color: var(--paper);
    }

    .scene {
      position: relative;
      min-height: 100%;
      isolation: isolate;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    .glow {
      position: fixed;
      inset: auto 0 0;
      height: 48vh;
      pointer-events: none;
      background: radial-gradient(ellipse at center bottom, rgba(255, 217, 232, 0.4), transparent 66%);
      filter: blur(10px);
      z-index: 0;
    }

    .message {
      position: fixed;
      left: 50%;
      bottom: clamp(28px, 6vh, 60px);
      z-index: 2;
      width: min(760px, calc(100vw - 34px));
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      text-align: center;
      transition: opacity 2.2s ease, transform 2.2s ease;
      text-shadow: 0 8px 28px rgba(31, 12, 23, 0.7);
    }

    .message.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .message p {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.35rem, 3.5vw, 2.75rem);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .message .small {
      display: block;
      margin-top: 14px;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(0.86rem, 2.2vw, 1.05rem);
      color: rgba(255, 247, 251, 0.78);
    }

    .toolbar {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 3;
      display: flex;
      gap: 10px;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 247, 251, 0.32);
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--paper);
      background: rgba(26, 20, 32, 0.42);
      box-shadow: 0 12px 28px rgba(10, 5, 18, 0.24);
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .icon-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 247, 251, 0.15);
      border-color: rgba(255, 247, 251, 0.58);
    }

    .icon-button:focus-visible {
      outline: 3px solid rgba(246, 212, 139, 0.65);
      outline-offset: 3px;
    }

    .icon {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .open-note {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 50% 44%, rgba(255, 238, 245, 0.22), transparent 30%),
        rgba(12, 10, 18, 0.68);
      backdrop-filter: blur(14px);
      transition: opacity 700ms ease, visibility 700ms ease;
    }

    .open-note.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .note-button {
      border: 1px solid rgba(255, 247, 251, 0.48);
      border-radius: 999px;
      padding: 15px 24px;
      color: #3a1d31;
      background: linear-gradient(135deg, #fff8fb, #f8dfe9);
      box-shadow: 0 20px 70px rgba(18, 8, 20, 0.4);
      font: 700 1rem/1 "Segoe UI", sans-serif;
      letter-spacing: 0;
      cursor: pointer;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 560px) {
      .toolbar {
        top: 12px;
        right: 12px;
      }

      .icon-button {
        width: 38px;
        height: 38px;
      }

      .message {
        bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="Lirios virtuales creciendo lentamente">
    <div class="glow"></div>
    <canvas id="garden"></canvas>

    <div class="toolbar" aria-label="Controles">
      <button class="icon-button" id="replay" type="button" aria-label="Reiniciar animación">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 3-6.7"></path>
          <path d="M3 4v6h6"></path>
        </svg>
      </button>
      <button class="icon-button" id="sound" type="button" aria-label="Activar sonido suave">
        <svg class="icon" id="soundIcon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
          <path d="M18 9l3 3-3 3"></path>
        </svg>
      </button>
    </div>

    <section class="message" id="message" aria-live="polite">
      <p>No logré comprarte las flores que más te gustan, pero soy programador asi que puedo crearlas virtualmente para ti.</p>
    </section>

    <div class="open-note" id="openNote">
      <button class="note-button" type="button" id="start">Para ti, Ash</button>
    </div>
    <p class="sr-only" id="fallbackText">
      Lirios virtuales creciendo lentamente con un mensaje romántico al final.
    </p>
  </main>

  <script>
    const canvas = document.querySelector("#garden");
    const ctx = canvas.getContext("2d");
    const message = document.querySelector("#message");
    const openNote = document.querySelector("#openNote");
    const startButton = document.querySelector("#start");
    const replayButton = document.querySelector("#replay");
    const soundButton = document.querySelector("#sound");
    const soundIcon = document.querySelector("#soundIcon");

    let width = 0;
    let height = 0;
    let dpr = 1;
    let startTime = 0;
    let rafId = 0;
    let started = false;
    let audioContext = null;
    let musicNodes = [];
    let soundOn = false;

    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
    const ease = (t) => t * t * (3 - 2 * t);
    const delayed = (time, start, duration) => clamp((time - start) / duration, 0, 1);

    const flowers = [
      { x: 0.50, y: 0.22, scale: 1.18, delay: 0.4, lean: -0.02, hue: 0, depth: 1.0, leaves: 3 },
      { x: 0.38, y: 0.32, scale: 0.9, delay: 1.0, lean: -0.13, hue: -8, depth: 0.92, leaves: 3 },
      { x: 0.62, y: 0.32, scale: 0.9, delay: 1.25, lean: 0.13, hue: 8, depth: 0.92, leaves: 3 },
      { x: 0.30, y: 0.40, scale: 0.78, delay: 1.8, lean: -0.22, hue: 12, depth: 0.82, leaves: 2 },
      { x: 0.70, y: 0.41, scale: 0.8, delay: 2.0, lean: 0.22, hue: -12, depth: 0.82, leaves: 2 },
      { x: 0.45, y: 0.42, scale: 0.73, delay: 2.7, lean: -0.07, hue: 14, depth: 0.76, leaves: 3 },
      { x: 0.56, y: 0.42, scale: 0.72, delay: 2.9, lean: 0.07, hue: -14, depth: 0.76, leaves: 3 },
      { x: 0.24, y: 0.50, scale: 0.58, delay: 3.5, lean: -0.3, hue: -4, depth: 0.66, leaves: 2 },
      { x: 0.76, y: 0.50, scale: 0.6, delay: 3.7, lean: 0.3, hue: 4, depth: 0.66, leaves: 2 },
      { x: 0.34, y: 0.52, scale: 0.55, delay: 4.2, lean: -0.18, hue: 10, depth: 0.62, leaves: 2 },
      { x: 0.66, y: 0.52, scale: 0.55, delay: 4.35, lean: 0.18, hue: -10, depth: 0.62, leaves: 2 }
    ];

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawBackground(time) {
      ctx.clearRect(0, 0, width, height);
      const night = ctx.createLinearGradient(0, 0, width, height);
      night.addColorStop(0, "#141520");
      night.addColorStop(0.46, "#2a1b30");
      night.addColorStop(1, "#55263c");
      ctx.fillStyle = night;
      ctx.fillRect(0, 0, width, height);

      const moon = ctx.createRadialGradient(width * 0.5, height * 0.18, 0, width * 0.5, height * 0.18, width * 0.7);
      moon.addColorStop(0, "rgba(255, 241, 247, 0.2)");
      moon.addColorStop(0.42, "rgba(246, 212, 139, 0.08)");
      moon.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = moon;
      ctx.fillRect(0, 0, width, height);

      for (let i = 0; i < 36; i++) {
        const x = ((i * 97) % 1000) / 1000 * width;
        const y = (((i * 53) % 400) / 400) * height * 0.52;
        const pulse = 0.45 + Math.sin(time * 1.4 + i) * 0.28;
        ctx.fillStyle = `rgba(255, 245, 231, ${0.12 + pulse * 0.12})`;
        ctx.beginPath();
        ctx.arc(x, y, 0.8 + (i % 3) * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      const ground = ctx.createLinearGradient(0, height * 0.66, 0, height);
      ground.addColorStop(0, "rgba(34, 47, 54, 0)");
      ground.addColorStop(1, "rgba(18, 30, 38, 0.7)");
      ctx.fillStyle = ground;
      ctx.fillRect(0, height * 0.55, width, height * 0.45);
    }

    function drawStem(baseX, baseY, flowerX, flowerY, progress, lean, depth) {
      const topX = baseX + (flowerX - baseX) * progress;
      const topY = baseY + (flowerY - baseY) * progress;
      ctx.lineWidth = Math.max(1.5, width * 0.0022 * depth);
      ctx.strokeStyle = depth < 0.75 ? "rgba(117, 154, 140, 0.68)" : "rgba(145, 184, 166, 0.76)";
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.bezierCurveTo(
        baseX + width * lean,
        baseY - height * 0.12 * progress,
        flowerX - width * lean * 0.35,
        flowerY + height * 0.18,
        topX,
        topY
      );
      ctx.stroke();
    }

    function drawPetal(size, length, progress, rotation, color, edge, curl) {
      const p = ease(progress);
      if (p <= 0) return;
      ctx.save();
      ctx.rotate(rotation);
      ctx.scale(0.18 + p * 0.82, 0.18 + p * 0.82);
      const gradient = ctx.createLinearGradient(0, 0, 0, -length);
      gradient.addColorStop(0, color);
      gradient.addColorStop(0.72, "#fff8fc");
      gradient.addColorStop(1, edge);
      ctx.fillStyle = gradient;
      ctx.shadowColor = "rgba(255, 235, 244, 0.5)";
      ctx.shadowBlur = 16 * p;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(-size * 0.46, -length * 0.25, -size * 0.35, -length * 0.82, 0, -length);
      ctx.bezierCurveTo(size * 0.35, -length * 0.82, size * 0.46, -length * 0.25, 0, 0);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = `rgba(201, 121, 165, ${0.28 * p})`;
      ctx.lineWidth = 1.4;
      ctx.stroke();
      ctx.restore();
    }

    function drawClosedBud(size, length, progress, color, edge) {
      const p = ease(progress);
      if (p <= 0) return;
      ctx.save();
      ctx.globalAlpha = p;
      ctx.shadowColor = "rgba(255, 229, 241, 0.36)";
      ctx.shadowBlur = 12 * p;

      for (let i = -1; i <= 1; i++) {
        const offset = i * size * 0.18;
        const tilt = i * 0.16;
        ctx.save();
        ctx.translate(offset, 0);
        ctx.rotate(tilt);
        const gradient = ctx.createLinearGradient(0, 0, 0, -length * 0.82);
        gradient.addColorStop(0, "#f5cfdf");
        gradient.addColorStop(0.55, color);
        gradient.addColorStop(1, edge);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(0, size * 0.08);
        ctx.bezierCurveTo(-size * 0.28, -length * 0.14, -size * 0.2, -length * 0.62, 0, -length * 0.88);
        ctx.bezierCurveTo(size * 0.2, -length * 0.62, size * 0.28, -length * 0.14, 0, size * 0.08);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = `rgba(214, 139, 178, ${0.22 * p})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
      }

      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(245, 193, 111, ${0.62 * p})`;
      ctx.beginPath();
      ctx.arc(0, size * 0.04, size * 0.12, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawLily(x, y, scale, progress, hue) {
      if (progress <= 0) return;
      const size = Math.min(width, height) * 0.055 * scale;
      const length = Math.min(width, height) * 0.14 * scale;
      const color = hue > 0 ? "#fae9f3" : "#fff3f8";
      const edge = hue > 0 ? "#e8a7ca" : "#d99cc2";
      const open = delayed(progress, 0.22, 0.78);
      const closed = 1 - delayed(progress, 0.12, 0.58);

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.sin((x + y) * 0.01) * 0.06);
      drawClosedBud(size, length, closed, color, edge);

      ctx.globalAlpha = 0.98;
      drawPetal(size, length, delayed(open, 0.00, 0.72), -0.82, color, edge, -0.08);
      drawPetal(size, length * 0.98, delayed(open, 0.10, 0.68), 0.82, color, edge, 0.08);
      drawPetal(size * 0.95, length * 1.08, delayed(open, 0.20, 0.62), 0, "#fff9fd", edge, 0);
      drawPetal(size * 0.86, length * 0.83, delayed(open, 0.30, 0.54), -1.55, "#f7e1ed", edge, -0.16);
      drawPetal(size * 0.86, length * 0.83, delayed(open, 0.38, 0.5), 1.55, "#f7e1ed", edge, 0.16);

      const centerProgress = ease(delayed(open, 0.45, 0.55));
      ctx.globalAlpha = centerProgress;
      ctx.strokeStyle = "#f0b65f";
      ctx.lineWidth = Math.max(1.4, size * 0.045);
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(0, -size * 0.12);
        ctx.quadraticCurveTo(i * size * 0.1, -length * 0.35, i * size * 0.18, -length * 0.54);
        ctx.stroke();
        ctx.fillStyle = "#8b4d42";
        ctx.beginPath();
        ctx.ellipse(i * size * 0.18, -length * 0.56, size * 0.035, size * 0.085, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "#f7c16f";
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.16, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPetals(time) {
      for (let i = 0; i < 26; i++) {
        const phase = (time * 0.035 + i * 0.061) % 1;
        const x = ((i * 71) % 100) / 100 * width + Math.sin(time * 0.5 + i) * 18;
        const y = phase * height * 0.9 + height * 0.04;
        const alpha = Math.sin(Math.PI * phase) * 0.34;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(time * 0.6 + i);
        ctx.fillStyle = `rgba(255, 228, 238, ${alpha})`;
        ctx.beginPath();
        ctx.ellipse(0, 0, 3 + (i % 4), 8 + (i % 5), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function animate(timestamp) {
      if (!startTime) startTime = timestamp;
      const elapsed = (timestamp - startTime) / 1000;
      drawBackground(elapsed);

      const baseY = height * 0.65;
      for (const flower of flowers) {
        const flowerX = width * flower.x;
        const flowerY = height * flower.y;
        const baseX = width * (0.5 + flower.lean * 0.32);
        const stemProgress = ease(delayed(elapsed, flower.delay, 4.8));
        const bloomProgress = delayed(elapsed, flower.delay + 3.7, 5.2);
        drawStem(baseX, baseY, flowerX, flowerY, stemProgress, flower.lean, flower.depth);
        drawLily(flowerX, flowerY, flower.scale, bloomProgress, flower.hue);
      }

      drawPetals(elapsed);

      if (elapsed > 12.4) {
        message.classList.add("is-visible");
      }

      rafId = requestAnimationFrame(animate);
    }

    function resetAnimation() {
      cancelAnimationFrame(rafId);
      startTime = 0;
      message.classList.remove("is-visible");
      rafId = requestAnimationFrame(animate);
    }

    function startExperience() {
      if (started) return;
      started = true;
      openNote.classList.add("is-hidden");
      resetAnimation();
    }

    function updateSoundIcon() {
      soundIcon.innerHTML = soundOn
        ? '<path d="M4 9v6h4l5 4V5L8 9H4z"></path><path d="M17 8a5 5 0 0 1 0 8"></path><path d="M20 5a9 9 0 0 1 0 14"></path>'
        : '<path d="M4 9v6h4l5 4V5L8 9H4z"></path><path d="M19 9l-6 6"></path><path d="M13 9l6 6"></path>';
      soundButton.setAttribute("aria-label", soundOn ? "Desactivar sonido suave" : "Activar sonido suave");
    }

    function stopMusic() {
      musicNodes.forEach((node) => {
        try {
          node.stop();
        } catch (error) {
          // Some browser nodes can only be stopped once.
        }
      });
      musicNodes = [];
    }

    function playMusic() {
      audioContext = audioContext || new AudioContext();
      stopMusic();
      const notes = [261.63, 329.63, 392.00, 493.88, 440.00, 392.00];
      const now = audioContext.currentTime;
      const master = audioContext.createGain();
      master.gain.value = 0.045;
      master.connect(audioContext.destination);

      notes.forEach((freq, index) => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, now + index * 1.6);
        gain.gain.linearRampToValueAtTime(0.52, now + index * 1.6 + 0.45);
        gain.gain.linearRampToValueAtTime(0, now + index * 1.6 + 1.55);
        osc.connect(gain);
        gain.connect(master);
        osc.start(now + index * 1.6);
        osc.stop(now + index * 1.6 + 1.7);
        musicNodes.push(osc);
      });
    }

    soundButton.addEventListener("click", async () => {
      soundOn = !soundOn;
      updateSoundIcon();
      if (soundOn) {
        if (audioContext?.state === "suspended") await audioContext.resume();
        playMusic();
      } else {
        stopMusic();
      }
    });

    startButton.addEventListener("click", () => {
      startExperience();
      if (soundOn) playMusic();
    });

    replayButton.addEventListener("click", () => {
      if (!started) startExperience();
      resetAnimation();
      if (soundOn) playMusic();
    });

    window.addEventListener("resize", () => {
      resize();
      if (started) resetAnimation();
    });

    resize();
    updateSoundIcon();
  </script>
</body>
</html>
